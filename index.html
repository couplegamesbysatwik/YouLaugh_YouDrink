<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple Drinking Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Fredoka:wght@400;700&family=Pacifico&family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🍺 Couple Drinking Game 🍺</h1>
        <p>Get ready to laugh and drink with your partner!</p>
        
        <!-- Category Selection Screen -->
        <div id="categoryScreen" class="screen">
            <h2>Pick Your Poison!</h2>
            <div class="category-buttons">
                <button id="jokesCategory" class="category-btn jokes-btn">
                    <div class="category-icon">😂</div>
                    <div class="category-name">Laugh Till You Cry</div>
                    <div class="category-desc">Warning: May cause uncontrollable laughter & drinking!</div>
                </button>
                <button id="actionCategory" class="category-btn action-btn">
                    <div class="category-icon">🎯</div>
                    <div class="category-name">Challenge Accepted 🎯</div>
                    <div class="category-desc">Do something ridiculously embarrassing together!</div>
                </button>
                <button id="explicit18Category" class="category-btn explicit-btn">
                    <div class="category-icon">🔞</div>
                    <div class="category-name">Spicy Stash 🔞</div>
                    <div class="category-desc">Not for the faint-hearted or sober! PS: Your grandmother should NOT be watching!</div>
                </button>
            </div>
        </div>
        
        <!-- Game Screen (hidden initially) -->
        <div id="gameScreen" class="screen hidden">
            <div class="game-header">
                <button id="backButton" class="back-btn hidden">🔙 Nope, Wrong Category!</button>
            </div>
            <button id="contentButton" class="funny-button">SPIN THE WHEEL OF CHAOS! ⚡ (Spoiler: You'll probably drink)</button>
        </div>
        
        <!-- Modal for content -->
        <div id="contentModal" class="modal">
            <div class="modal-content">
                <button id="closeButton" class="close-btn">&times;</button>
                <p id="contentText"></p>
                <div id="reactionButtons" class="hidden">
                    <button id="laughedButton" class="reaction-btn laugh">Laughed!</button>
                    <button id="notFunnyButton" class="reaction-btn not-funny">Nope. Bring the Heavy Artillery! 🔫</button>
                </div>
                <div id="actionReactionButtons" class="hidden">
                    <button id="actionLaughedButton" class="reaction-btn laugh">Laughed! 😂</button>
                    <button id="actionNotFunnyButton" class="reaction-btn not-funny">Didn't Laugh 😑</button>
                    <button id="actionSkipButton" class="reaction-btn not-funny">Skip This One</button>
                </div>
            </div>
        </div>
        
        <!-- Modal for prompt -->
        <div id="promptModal" class="modal">
            <div class="modal-content">
                <p id="promptText"></p>
                <button id="newContentButton" class="new-joke-btn">Bring It On!</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
